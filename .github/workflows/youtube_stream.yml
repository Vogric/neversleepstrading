name: YouTube Live Stream

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */5 * * *"

permissions:
  actions: write

jobs:
  stream:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ffmpeg xvfb chromium-browser fonts-liberation

      - name: Check stream key
        env:
          YT_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
        run: |
          if [ -z "$YT_KEY" ]; then
            echo "::error::Missing secret YOUTUBE_STREAM_KEY."
            exit 1
          fi

      - name: Start scene server
        run: |
          python3 stream_server.py > server.log 2>&1 &
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8765/api/overview > /dev/null; then break; fi
            sleep 1
          done
          curl -sf http://127.0.0.1:8765/live > /dev/null || (cat server.log; exit 1)

      - name: Stream with overlap relay
        env:
          YOUTUBE_STREAM_KEY: ${{ secrets.YOUTUBE_STREAM_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DURATION: "19500"
        run: |
          (
            sleep 45
            for id in $(gh run list --workflow youtube_stream.yml --status in_progress --json databaseId --jq "[.[] | select(.databaseId != ${{ github.run_id }})] | .[].databaseId" 2>/dev/null); do
              gh run cancel "$id" || true
            done
          ) &
          ( sleep 19200 && gh workflow run youtube_stream.yml || true ) &
          RELAY_PID=$!
          bash stream_scene.sh
          kill "$RELAY_PID" 2>/dev/null || true

      - name: Fallback relay on early failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run youtube_stream.yml || true
